name: Release CLI

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      semver:
        description: Semver category for this release.
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      notes:
        description: Optional release notes body.
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  release-cli:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && contains(github.event.pull_request.labels.*.name, 'release:cli'))
    runs-on: ubuntu-latest
    env:
      RELEASE_LABELS: ${{ github.event_name == 'workflow_dispatch' && format('["release:cli","semver:{0}"]', inputs.semver) || toJson(github.event.pull_request.labels.*.name) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - name: Validate release labels
        run: bun scripts/release/labels.mjs "$RELEASE_LABELS"
      - name: Publish CLI
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: ${{ github.event.repository.private == false }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TARGET: cli
          RELEASE_PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          RELEASE_PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || 'Manual CLI release' }}
          RELEASE_PR_BODY: ${{ github.event_name == 'pull_request' && github.event.pull_request.body || inputs.notes }}
        run: |
          VERSION=$(bun -e "console.log(require('./apps/cli/package.json').version)")
          bun run --cwd apps/cli build
          cd apps/cli
          npm publish --access public
          cd ../..
          git tag cli-v$VERSION
          git push origin cli-v$VERSION
          RELEASE_VERSION=$VERSION bun scripts/release/notes.ts > release-notes.md
          gh release create cli-v$VERSION --title "OpenDrop CLI v$VERSION" --notes-file release-notes.md
