name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "skills/**"
      - "tests/**"
      - "docs/**"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "package.json"
      - "bun.lock"
      - "README.md"
      - "CHANGELOG.md"
      - "playwright.config.ts"
      - "tsconfig.base.json"
      - "vitest.config.ts"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "skills/**"
      - "tests/**"
      - "docs/**"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "package.json"
      - "bun.lock"
      - "README.md"
      - "CHANGELOG.md"
      - "playwright.config.ts"
      - "tsconfig.base.json"
      - "vitest.config.ts"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: opendrop
          POSTGRES_PASSWORD: opendrop
          POSTGRES_DB: opendrop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opendrop -d opendrop"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
      - run: bun run --cwd apps/cli test:node
      - run: bun run test:unit
      - run: bun run test:http
      - run: bun run test:repositories
        env:
          OPENDROP_POSTGRES_TEST_URL: postgres://opendrop:opendrop@localhost:5432/opendrop
      - run: docker compose -f docker-compose.e2e.yml up -d minio createbuckets
      - run: bun run test:storage
        env:
          OPENDROP_S3_TEST_ENDPOINT: http://127.0.0.1:19000
      - run: bunx playwright install --with-deps chromium firefox webkit
      - name: Start E2E Docker Compose
        id: e2e_compose
        run: bun run test:e2e:start
      - name: Run UI E2E
        run: bun run test:e2e:ui
        env:
          OPENDROP_E2E_SERVER_URL: http://127.0.0.1:43300
          OPENDROP_E2E_BROWSER_MATRIX: full
      - name: Run CLI E2E
        if: ${{ !cancelled() && steps.e2e_compose.outcome == 'success' }}
        run: bun run test:e2e:cli
        env:
          OPENDROP_E2E_SERVER_URL: http://127.0.0.1:43300
      - name: Stop E2E Docker Compose
        if: always()
        run: bun run test:e2e:down
      - run: bun run test:skills
      - run: bun run release:dry-run

  docker-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build .

  npm-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/cli build
      - run: bun run --cwd apps/cli test:node
      - run: bun run --cwd apps/cli pack:dry-run
