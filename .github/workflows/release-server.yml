name: Release Server

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  release-server:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && contains(github.event.pull_request.labels.*.name, 'release:server')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Validate release labels
        run: bun scripts/release/labels.mjs '${{ toJson(github.event.pull_request.labels.*.name) }}'
      - name: Publish server image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TARGET: server
          RELEASE_PR_NUMBER: ${{ github.event.pull_request.number }}
          RELEASE_PR_TITLE: ${{ github.event.pull_request.title }}
          RELEASE_PR_BODY: ${{ github.event.pull_request.body }}
          RELEASE_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          RELEASE_IMAGE: ghcr.io/${{ github.repository_owner }}/opendrop-server
        run: |
          docker login ghcr.io -u '${{ github.actor }}' -p '${{ secrets.GITHUB_TOKEN }}'
          VERSION=$(bun -e "console.log(require('./apps/server/package.json').version)")
          docker build -t ghcr.io/${{ github.repository_owner }}/opendrop-server:$VERSION -t ghcr.io/${{ github.repository_owner }}/opendrop-server:latest .
          docker push ghcr.io/${{ github.repository_owner }}/opendrop-server:$VERSION
          docker push ghcr.io/${{ github.repository_owner }}/opendrop-server:latest
          git tag server-v$VERSION
          git push origin server-v$VERSION
          RELEASE_VERSION=$VERSION bun scripts/release/notes.ts > release-notes.md
          gh release create server-v$VERSION --title "OpenDrop Server v$VERSION" --notes-file release-notes.md
