services:
  dev:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: opendrop-dev-secret-change-before-production
      OPENDROP_AUTH_MODE: dev
      OPENDROP_DB_DRIVER: sqlite
      SQLITE_PATH: /data/opendrop.sqlite
      OPENDROP_STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: opendrop
      S3_ACCESS_KEY_ID: opendrop
      S3_SECRET_ACCESS_KEY: opendrop-secret
      S3_FORCE_PATH_STYLE: "true"
      OPENDROP_DEFAULT_VISIBILITY: public
    volumes:
      - opendrop-dev-data:/data
    depends_on:
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: opendrop
      MINIO_ROOT_PASSWORD: opendrop-secret
    volumes:
      - opendrop-dev-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "mc alias set local http://minio:9000 opendrop opendrop-secret && mc mb --ignore-existing local/opendrop"]

volumes:
  opendrop-dev-data:
  opendrop-dev-minio:
